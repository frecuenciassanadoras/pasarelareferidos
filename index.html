<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroSync | Estación de Mando del Embajador</title>
    <style>
        :root {
            --bg-color: #05080f;
            --panel-bg: #111625;
            --card-bg: linear-gradient(145deg, #1a2133, #0d121d);
            --accent-cyan: #00f0ff;
            --accent-green: #00ff88;
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --border-glow: rgba(0, 240, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .dashboard-container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        /* Cabecera y Gamificación */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a3441;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header-section h1 { margin: 0; font-weight: 600; letter-spacing: 1px; color: var(--accent-cyan); }
        .badge { background: rgba(0, 240, 255, 0.1); border: 1px solid var(--accent-cyan); color: var(--accent-cyan); padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: bold; text-transform: uppercase; }

        /* Grid de Métricas */
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .metric-card { background: var(--card-bg); border: 1px solid var(--border-glow); border-radius: 12px; padding: 25px; text-align: center; position: relative; }
        .metric-card.highlight { border-color: var(--accent-cyan); box-shadow: 0 0 20px rgba(0, 240, 255, 0.15); }
        .metric-label { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; display: block; }
        .metric-value { font-size: 38px; font-weight: bold; color: var(--text-main); margin: 0; }
        .metric-card.highlight .metric-value { color: var(--accent-cyan); text-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }

        /* Zona de Enlace y Retiro */
        .action-section { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 40px; }
        .link-box-container { background-color: rgba(0, 0, 0, 0.4); border-radius: 10px; padding: 20px; border: 1px solid #2a3441; }
        .link-input-group { display: flex; gap: 10px; margin-top: 10px; }
        .link-box { background-color: #05080f; border: 1px solid #333; padding: 12px 15px; border-radius: 6px; font-family: monospace; color: var(--accent-cyan); flex-grow: 1; font-size: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn { background-color: var(--accent-cyan); color: #000; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { background-color: #00c4d1; box-shadow: 0 0 15px rgba(0, 240, 255, 0.4); }
        .btn-withdraw { background-color: transparent; color: var(--accent-green); border: 2px solid var(--accent-green); height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; font-size: 16px; }
        .btn-withdraw:hover { background-color: rgba(0, 255, 136, 0.1); box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }

        /* Tablas de Historial */
        .history-container { display: grid; grid-template-columns: 1fr; gap: 30px; margin-bottom: 40px; }
        .history-box h3 { font-size: 16px; color: var(--text-muted); border-bottom: 1px solid #2a3441; padding-bottom: 10px; margin-bottom: 15px; }
        .history-list { list-style: none; padding: 0; margin: 0; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .history-item span.date { color: var(--text-muted); }
        .history-item span.amount-plus { color: var(--accent-green); font-weight: bold; }

        @media (max-width: 768px) {
            .action-section, .history-container { grid-template-columns: 1fr; }
            .header-section { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <div class="header-section">
            <h1>MODO CREACIÓN</h1>
            <div class="badge">Rango: Maestro de Resonancia</div>
        </div>
        
        <div class="metrics-grid">
            <div class="metric-card highlight">
                <span class="metric-label">Saldo Disponible</span>
                <p class="metric-value" id="saldo-disponible">Cargando...</p>
            </div>
            <div class="metric-card">
                <span class="metric-label">Ventas Totales</span>
                <p class="metric-value" id="ventas-totales">-</p>
            </div>
            <div class="metric-card">
                <span class="metric-label">Clics en tu Enlace</span>
                <p class="metric-value" id="clics-totales">-</p>
            </div>
        </div>

        <div class="action-section">
            <div class="link-box-container">
                <span class="metric-label">Tu Enlace de Embajador (Lemon Squeezy)</span>
                <div class="link-input-group">
                    <div class="link-box" id="enlace-referido">Generando enlace seguro...</div>
                    <button class="btn btn-copy" onclick="copiarEnlace()">Copiar</button>
                </div>
            </div>
            <button class="btn btn-withdraw" onclick="solicitarRetiro()">
                <span>💸 Solicitar Retiro</span>
            </button>
        </div>

        <div class="history-container">
            <div class="history-box">
                <h3>Últimas Ventas Generadas</h3>
                <ul class="history-list" id="historial-ventas-lista">
                    <li class="history-item">
                        <span class="date">Cargando transacciones...</span>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Scripts de Conexión a tu API de Render -->
    <script>
        // 1. Configuración de Entorno
        const API_RENDER = "https://neurosync-api-0stl.onrender.com";
        const LEMON_CHECKOUT_BASE = "https://academy-neurosync.lemonsqueezy.com/checkout/buy/87ffe622-a5a2-4748-89b2-410c94759f07";

        // 2. Simulamos la sesión del usuario (En producción esto viene del login)
        // Por ahora, lee de la URL (ej: misitio.com/panel?embajador=carlos-vibes) o usa uno por defecto
        const urlParams = new URLSearchParams(window.location.search);
        const embajadorActivo = urlParams.get('embajador') || 'carlos-vibes'; 

        // 3. Función Principal: Cargar datos desde Supabase a través de tu API
        async function cargarDashboard() {
            try {
                const respuesta = await fetch(`${API_RENDER}/api/dashboard-data/${embajadorActivo}`);
                
                if (!respuesta.ok) throw new Error("Error al conectar con la base de datos");
                
                const datos = await respuesta.json();

                // Actualizar contadores visuales
                document.getElementById('saldo-disponible').innerText = `$${datos.saldo_acumulado.toFixed(2)}`;
                document.getElementById('ventas-totales').innerText = datos.total_ventas;
                document.getElementById('clics-totales').innerText = datos.total_clics;

                // CREACIÓN DEL ENLACE TRACKEADO PARA LEMON SQUEEZY
                const enlaceFinal = `${LEMON_CHECKOUT_BASE}?checkout[custom][neurosync_ref]=${datos.codigo_referido}`;
                document.getElementById('enlace-referido').innerText = enlaceFinal;

                // Actualizar la lista del historial
                const listaHistorial = document.getElementById('historial-ventas-lista');
                listaHistorial.innerHTML = ''; // Limpiamos el texto de carga

                if (datos.historial_ventas.length === 0) {
                    listaHistorial.innerHTML = '<li class="history-item"><span class="date">Aún no hay ventas registradas. ¡Comparte tu enlace!</span></li>';
                } else {
                    datos.historial_ventas.forEach(venta => {
                        const li = document.createElement('li');
                        li.className = 'history-item';
                        li.innerHTML = `
                            <span class="date">${venta.fecha}</span>
                            <span>NeuroSync - Acceso Vitalicio</span>
                            <span class="amount-plus">+$${venta.monto.toFixed(2)}</span>
                        `;
                        listaHistorial.appendChild(li);
                    });
                }

            } catch (error) {
                console.error("Fallo de conexión:", error);
                document.getElementById('saldo-disponible').innerText = "$0.00";
                document.getElementById('enlace-referido').innerText = "Error cargando enlace. Revisa tu conexión.";
            }
        }

        // 4. Funciones de Interfaz (Copiar y Retirar)
        function copiarEnlace() {
            const enlace = document.getElementById('enlace-referido').innerText;
            navigator.clipboard.writeText(enlace).then(() => {
                const btn = document.querySelector('.btn-copy');
                const textoOriginal = btn.innerText;
                
                btn.innerText = "¡COPIADO!";
                btn.style.backgroundColor = "var(--accent-green)";
                
                setTimeout(() => {
                    btn.innerText = textoOriginal;
                    btn.style.backgroundColor = "var(--accent-cyan)";
                }, 2000);
            });
        }

        function solicitarRetiro() {
            const saldoTexto = document.getElementById('saldo-disponible').innerText;
            const saldo = parseFloat(saldoTexto.replace('$', ''));

            if (saldo > 0) {
                alert(`Solicitud enviada. Procesaremos tu retiro de $${saldo.toFixed(2)} a la brevedad.`);
            } else {
                alert("Aún no tienes saldo suficiente para solicitar un retiro.");
            }
        }

        // Iniciar la carga al abrir la página
        document.addEventListener("DOMContentLoaded", cargarDashboard);
    </script>
</body>
</html>
