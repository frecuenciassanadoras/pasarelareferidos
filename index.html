<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroSync | Estación de Mando del Embajador</title>
    <style>
        :root {
            /* Colores ajustados a fondos 100% negros */
            --bg-color: #000000;
            --panel-bg: #000000;
            --card-bg: #0a0a0a;
            --accent-cyan: #00E5FF;
            --accent-green: #00C853;
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --border-glow: rgba(0, 229, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .dashboard-container {
            background-color: var(--panel-bg);
            border-radius: 16px;
            padding: 15px;
            width: 100%;
            max-width: 900px;
            box-sizing: border-box;
        }

        /* Cabecera */
        .header-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header-section h1 { 
            margin: 0; 
            font-weight: 700; 
            letter-spacing: 1px; 
            color: #FFFFFF; /* Letras blancas como pediste */
            font-size: 22px;
        }
        
        .badge { 
            border: 1px solid var(--accent-cyan); 
            color: var(--accent-cyan); 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: bold; 
            text-transform: uppercase; 
        }

        /* Grid de Métricas en UNA SOLA LÍNEA */
        .metrics-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* 3 columnas iguales */
            gap: 8px; 
            margin-bottom: 25px; 
        }
        
        .metric-card { 
            background: var(--card-bg); 
            border: 1px solid #1f1f1f; 
            border-radius: 8px; 
            padding: 12px 5px; 
            text-align: center; 
        }
        
        .metric-card.highlight { 
            border-color: var(--accent-cyan); 
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.1); 
        }
        
        .metric-label { 
            font-size: 9px; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            margin-bottom: 5px; 
            display: block; 
        }
        
        .metric-value { 
            font-size: 18px; /* Números más compactos */
            font-weight: bold; 
            color: var(--text-main); 
            margin: 0; 
        }
        
        .metric-card.highlight .metric-value { 
            color: var(--accent-cyan); 
        }

        /* Zona de Enlace y Retiro */
        .action-section { 
            display: flex; 
            flex-direction: column;
            gap: 15px; 
            margin-bottom: 25px; 
            width: 100%; 
        }
        
        .link-box-container { 
            background-color: #0a0a0a; 
            border-radius: 10px; 
            padding: 15px; 
            border: 1px solid #1f1f1f; 
        }
        
        .link-input-group { 
            display: flex; 
            gap: 8px; 
            margin-top: 8px; 
            width: 100%; 
        }
        
        .link-box { 
            background-color: #000000; 
            border: 1px solid #333; 
            padding: 10px; 
            border-radius: 6px; 
            color: var(--accent-cyan); 
            font-size: 13px; 
            flex: 1; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
        }
        
        .btn { 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-copy { 
            background-color: var(--accent-cyan); 
            padding: 0 12px;
            min-width: 40px;
        }

        /* Botón de Retiro Verde y Letras Blancas */
        .btn-withdraw { 
            background-color: var(--accent-green); 
            color: #FFFFFF; 
            width: 100%;
            padding: 14px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
        }

        /* Tablas de Historial */
        .history-container { display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }
        .history-box h3 { font-size: 13px; color: var(--text-muted); border-bottom: 1px solid #1f1f1f; padding-bottom: 8px; margin-bottom: 10px; margin-top: 0;}
        .history-list { list-style: none; padding: 0; margin: 0; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #111; font-size: 12px; }
        .history-item span.date { color: var(--text-muted); }
        .history-item span.amount-plus { color: var(--accent-green); font-weight: bold; }
        .history-item span.amount-minus { color: #ff4444; font-weight: bold; }

    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <div class="header-section">
            <h1>MODO CREACIÓN</h1>
            <div class="badge">Rango: Maestro de Resonancia</div>
        </div>
        
        <div class="metrics-grid">
            <div class="metric-card highlight">
                <span class="metric-label">Saldo</span>
                <p class="metric-value" id="saldo-disponible">Cargando...</p>
            </div>
            <div class="metric-card">
                <span class="metric-label">Ventas</span>
                <p class="metric-value" id="ventas-totales">-</p>
            </div>
            <div class="metric-card">
                <span class="metric-label">Clics</span>
                <p class="metric-value" id="clics-totales">-</p>
            </div>
        </div>

        <div class="action-section">
            <div class="link-box-container">
                <span class="metric-label">Tu Enlace de Embajador Seguro</span>
                <div class="link-input-group">
                    <div class="link-box" id="enlace-referido">Generando enlace...</div>
                    <button class="btn btn-copy" onclick="copiarEnlace()" title="Copiar enlace">
                        <!-- Icono SVG de copiar -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <button class="btn btn-withdraw" onclick="solicitarRetiro()">
                💸 Solicitar Retiro
            </button>
        </div>

        <div class="history-container">
            <div class="history-box">
                <h3>Últimas Ventas Generadas</h3>
                <ul class="history-list" id="historial-ventas-lista">
                    <li class="history-item">
                        <span class="date">Cargando...</span>
                    </li>
                </ul>
            </div>
            
            <!-- Nueva Sección de Retiros -->
            <div class="history-box">
                <h3>Historial de Retiros</h3>
                <ul class="history-list" id="historial-retiros-lista">
                    <li class="history-item">
                        <span class="date">Aún no hay retiros registrados.</span>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const API_RENDER = "https://neurosync-api-0stl.onrender.com";

        const urlParams = new URLSearchParams(window.location.search);
        const embajadorActivo = urlParams.get('embajador') || 'GUILOX1Z'; 

        async function cargarDashboard() {
            try {
                const respuesta = await fetch(`${API_RENDER}/api/dashboard-data/${embajadorActivo}`);
                
                if (!respuesta.ok) throw new Error("Error al conectar con la base de datos");
                
                const datos = await respuesta.json();

                document.getElementById('saldo-disponible').innerText = `$${datos.saldo_acumulado.toFixed(2)}`;
                document.getElementById('ventas-totales').innerText = datos.total_ventas;
                document.getElementById('clics-totales').innerText = datos.total_clics;

                const enlaceFinal = `${API_RENDER}/ref/${datos.codigo_referido}`;
                document.getElementById('enlace-referido').innerText = enlaceFinal;

                const listaHistorial = document.getElementById('historial-ventas-lista');
                listaHistorial.innerHTML = ''; 

                if (datos.historial_ventas.length === 0) {
                    listaHistorial.innerHTML = '<li class="history-item"><span class="date">Aún no hay ventas registradas.</span></li>';
                } else {
                    datos.historial_ventas.forEach(venta => {
                        const li = document.createElement('li');
                        li.className = 'history-item';
                        li.innerHTML = `
                            <span class="date">${venta.fecha}</span>
                            <span>NeuroSync</span>
                            <span class="amount-plus">+$${venta.monto.toFixed(2)}</span>
                        `;
                        listaHistorial.appendChild(li);
                    });
                }

            } catch (error) {
                console.error("Fallo de conexión:", error);
                document.getElementById('saldo-disponible').innerText = "$0.00";
                document.getElementById('enlace-referido').innerText = "Error cargando enlace.";
            }
        }

        function copiarEnlace() {
            const enlace = document.getElementById('enlace-referido').innerText;
            navigator.clipboard.writeText(enlace).then(() => {
                const btn = document.querySelector('.btn-copy');
                const svgOriginal = btn.innerHTML; // Guarda el icono
                
                // Cambia a un check temporalmente
                btn.innerHTML = `<span style="color:#000; font-size:14px; font-weight:bold;">✓</span>`;
                btn.style.backgroundColor = "var(--accent-green)";
                
                setTimeout(() => {
                    btn.innerHTML = svgOriginal; // Restaura el icono
                    btn.style.backgroundColor = "var(--accent-cyan)";
                }, 2000);
            });
        }

        function solicitarRetiro() {
            const saldoTexto = document.getElementById('saldo-disponible').innerText;
            const saldo = parseFloat(saldoTexto.replace('$', ''));

            if (saldo > 0) {
                alert(`Solicitud enviada. Procesaremos tu retiro de $${saldo.toFixed(2)} a la brevedad.`);
            } else {
                alert("Aún no tienes saldo suficiente para solicitar un retiro.");
            }
        }

        document.addEventListener("DOMContentLoaded", cargarDashboard);
    </script>
</body>
</html>
